<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>My Knowledge base</h1>
                <p id="item-count">Loading items...</p>
            </div>
        </header>

        <main id="items-grid" class="items-grid">
            <!-- Items injected by JS -->
        </main>
    </div>

    <script>
        async function fetchItems() {
            try {
                const response = await fetch('/api/items');
                const items = await response.json();
                renderItems(items);
            } catch (err) {
                console.error('Failed to fetch items:', err);
                document.getElementById('item-count').textContent = 'Error loading data.';
            }
        }

        function renderItems(items) {
            const grid = document.getElementById('items-grid');
            const countEl = document.getElementById('item-count');

            countEl.textContent = `${items.length} bits of knowledge saved.`;

            if (items.length === 0) {
                grid.innerHTML = '<div class="empty-state">No items saved yet. Start by using the extension!</div>';
                return;
            }

            grid.innerHTML = items.map(item => `
                <div class="card" id="card-${item.id}">
                    <div class="card-header">
                        <span class="timestamp">${new Date(item.timestamp).toLocaleString()}</span>
                        <div class="card-actions">
                            <a href="${item.url}" target="_blank" class="source-link">Source ↗</a>
                            <button class="delete-btn" onclick="deleteItem(${item.id})">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    </div>
                    <h2 class="card-title">${item.title}</h2>
                    <div class="card-content">
                        <blockquote>${item.selectedText}</blockquote>
                    </div>
                    ${item.note ? `<div class="card-note"><strong>Note:</strong> ${item.note}</div>` : ''}
                </div>
            `).join('');
        }

        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this save?')) return;

            try {
                const response = await fetch(`/api/items/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    // Refresh data
                    fetchItems();
                } else {
                    alert('Failed to delete item.');
                }
            } catch (err) {
                console.error('Error deleting item:', err);
                alert('Error deleting item.');
            }
        }

        fetchItems();
        // Refresh every 30 seconds
        setInterval(fetchItems, 30000);
    </script>
</body>

</html>
